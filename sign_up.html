<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LupusLink | Sign In or Sign Up</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="auth-page">
                    <button type="submit" class="btn btn-primary auth-submit">Sign in</button>
                    <p class="form-footnote">New here? <a href="#" class="switch-link" data-target="signup">Create an account</a></p>
                </form>

                <form id="signup" class="auth-form" hidden novalidate>
                    <label>
                        Full name
                        <input type="text" placeholder="Your name" required>
                    </label>
                    <label>
                        Email address
                        <input type="email" placeholder="you@example.com" required>
                    </label>
                    <label>
                        Create password
                        <input type="password" placeholder="At least 8 characters" required>
                    </label>
                    <label>
                        I am joining as
                        <select>
                            <option>Patient</option>
                            <option>Caregiver</option>
                            <option>Healthcare supporter</option>
                        </select>
                    </label>
                    <button type="submit" class="btn btn-primary auth-submit">Create account</button>
                    <p class="form-footnote">Already a member? <a href="#" class="switch-link" data-target="signin">Sign in instead</a></p>
                </form>
            </div>
        </div>
    </div>

    <script>
        const tabs = document.querySelectorAll('.auth-tab');
        const forms = document.querySelectorAll('.auth-form');
        const switchLinks = document.querySelectorAll('.switch-link');

        function showPanel(targetId) {
            forms.forEach((form) => {
                const isActive = form.id === targetId;
                form.classList.toggle('active', isActive);
                form.hidden = !isActive;
            });

            tabs.forEach((tab) => {
                const isActive = tab.dataset.target === targetId;
                tab.classList.toggle('active', isActive);
                tab.setAttribute('aria-selected', String(isActive));
            });
        }

        tabs.forEach((tab) => {
            tab.addEventListener('click', () => showPanel(tab.dataset.target));
        });

        switchLinks.forEach((link) => {
            link.addEventListener('click', (event) => {
                event.preventDefault();
                showPanel(link.dataset.target);
            });
        });
    </script>
</body>

</html>
